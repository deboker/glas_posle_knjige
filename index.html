<!doctype html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.css"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/kriss.png" />

    <title>Glas posle knjige</title>

    <link rel="stylesheet" href="index.css" />

    <!-- Elegantnejší font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <main>
      <section class="chatbot-container">
        <div class="chatbot-header">
          <img
            src="images/kriss_no_text.png"
            class="logo"
            alt="Glas posle knjige"
          />
          <h1>Glas posle knjige</h1>
          <p>Razgovor koji počinje tamo gde knjiga staje.</p>
        </div>

        <div
          class="chatbot-conversation-container"
          id="chatbot-conversation-container"
        ></div>

        <form id="form" class="chatbot-input-container">
          <input
            name="user-input"
            type="text"
            id="user-input"
            placeholder="Postavi pitanje..."
            required
          />
          <button id="submit-btn" class="submit-btn">Pošalji</button>
        </form>
      </section>
    </main>

    <script src="index.js" type="module"></script>
  </body>
</html>
